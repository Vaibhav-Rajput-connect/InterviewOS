services:
  - type: web
    name: interviewos-backend
    env: python
    rootDir: apps/backend
    buildCommand: "pip install -e . && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://interviewos.vercel.app"
    plan: free

