services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: interviewos-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-interviewos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewos_secret}
      POSTGRES_DB: ${POSTGRES_DB:-interviewos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interviewos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interviewos

  # ==========================================
  # FastAPI Backend
  # ==========================================
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: interviewos-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-interviewos}:${POSTGRES_PASSWORD:-interviewos_secret}@db:5432/${POSTGRES_DB:-interviewos}
      CORS_ORIGINS: '["http://localhost:3000"]'
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: InterviewOS
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interviewos
    restart: unless-stopped

  # ==========================================
  # Next.js Frontend (dev mode)
  # ==========================================
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    container_name: interviewos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - interviewos
    restart: unless-stopped

  # ==========================================
  # Adminer (Database Admin - Dev Only)
  # ==========================================
  adminer:
    image: adminer:latest
    container_name: interviewos-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - interviewos
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  interviewos:
    driver: bridge
